services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket
      POSTGRES_INITDB_ARGS: "--locale=C"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      POLYMARKET_DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      POLYMARKET_FUNDER: ${POLYMARKET_FUNDER:-}
      POLYMARKET_SIGNATURE_TYPE: ${POLYMARKET_SIGNATURE_TYPE:-2}
      POLYMARKET_BUILDER_CODE: ${POLYMARKET_BUILDER_CODE:-}
      POLYMARKET_POLYGON_WSS: ${POLYMARKET_POLYGON_WSS:-}
      BASE_PATH: ${BASE_PATH:-/}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
